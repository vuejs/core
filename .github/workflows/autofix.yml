name: autofix.ci

on:
  pull_request:
permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: '.node-version'
          cache: true

      - name: Run fix
        run: vp check --fix

      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
