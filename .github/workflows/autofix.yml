name: autofix.ci

on:
  pull_request:
permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true
          run-install: false

      - run: vp install --frozen-lockfile

      - name: Run lint
        run: vp lint --fix

      - name: Run format
        run: vp fmt

      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
